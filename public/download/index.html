<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no,email=no,address=no" />
  <title>烧不起下载</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #e45c1a;
      --primary-press: #cc4f14;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f9fbff 0%, var(--bg) 65%);
      min-height: 100vh;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 16px 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(145deg, #ff8d58 0%, #e45c1a 100%);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 14px rgba(228, 92, 26, 0.28);
    }

    .brand-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .panel {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--line);
      box-shadow: 0 10px 28px rgba(31, 41, 55, 0.06);
      padding: 20px 16px;
    }

    .title {
      font-size: 24px;
      line-height: 1.35;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 15px;
      line-height: 1.75;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .steps {
      list-style: none;
      margin-bottom: 14px;
    }

    .steps li {
      position: relative;
      padding-left: 18px;
      font-size: 14px;
      color: #374151;
      line-height: 1.7;
      margin-bottom: 8px;
    }

    .steps li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 9px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #f59e0b;
    }

    .tip {
      font-size: 13px;
      line-height: 1.7;
      color: #4b5563;
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 16px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 12px;
      height: 46px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:active {
      background: var(--primary-press);
    }

    .btn-secondary {
      background: #fff;
      color: #6b7280;
      border: 1px solid var(--line);
    }

    .footer-note {
      margin-top: 12px;
      border-top: 1px dashed var(--line);
      padding-top: 12px;
    }

    .footer-title {
      font-size: 13px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 6px;
    }

    .footer-text {
      font-size: 12px;
      line-height: 1.75;
      color: #6b7280;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 28px);
      transform: translateX(-50%);
      background: rgba(17, 24, 39, 0.9);
      color: #fff;
      font-size: 13px;
      line-height: 1.6;
      border-radius: 10px;
      padding: 10px 14px;
      max-width: calc(100vw - 32px);
      text-align: center;
      z-index: 99;
      display: none;
    }

    .toast.show {
      display: block;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="brand">
      <div class="logo">烧不起</div>
      <h1 class="brand-name">烧不起下载</h1>
    </section>

    <section class="panel">
      <h2 id="scene-title" class="title"></h2>
      <p id="scene-desc" class="desc"></p>
      <ul id="scene-steps" class="steps"></ul>
      <p id="scene-tip" class="tip"></p>

      <div class="actions">
        <button id="action-btn" class="btn btn-primary" type="button"></button>
        <button id="close-btn" class="btn btn-secondary" type="button">稍后再说</button>
      </div>

      <div class="footer-note">
        <p class="footer-title">烧不起安装说明</p>
        <p class="footer-text">Android 设备可直接下载并安装烧不起安卓版；iPhone 设备请使用 Safari 打开本页并选择“添加到主屏幕”。若在微信内访问，请先通过“在浏览器打开”后再继续操作。</p>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    (function () {
      var ua = navigator.userAgent.toLowerCase();
      var isIPhone = /iphone|ipad|ipod/.test(ua);
      var isAndroid = /android/.test(ua);
      var isWeChat = /micromessenger/.test(ua);
      var isQQBrowser = /mqqbrowser|qqbrowser/.test(ua);
      var isSafari = isIPhone && /safari/.test(ua) && !/crios|fxios|edgios|micromessenger|mqqbrowser|qqbrowser/.test(ua);

      var params = new URLSearchParams(window.location.search);
      var apkUrl = (params.get('apk') || '').trim() || '/download/shaobuqi.apk';

      var scenes = {
        android: {
          title: '下载烧不起安卓版',
          desc: '当前浏览器支持直接下载安装烧不起安卓版。点击下方按钮即可开始下载。',
          steps: [
            '点击“立即下载”开始下载',
            '下载完成后打开安装包',
            '按系统提示完成安装'
          ],
          tip: '如系统提示无法安装，请允许当前浏览器安装未知应用后再继续。',
          actionText: '立即下载',
          action: 'download'
        },
        androidQQ: {
          title: '在 QQ 浏览器下载烧不起',
          desc: '当前使用 QQ 浏览器，可直接下载烧不起 APK。下载完成后按页面提示继续安装。',
          steps: [
            '点击“立即下载”获取安装包',
            '下载完成后，在 QQ 浏览器下载记录中找到安装包',
            '打开安装包并按提示完成安装'
          ],
          tip: '若安装受限，请在系统设置中允许 QQ 浏览器安装未知应用。',
          actionText: '立即下载',
          action: 'download'
        },
        wechat: {
          title: '请在浏览器中打开下载',
          desc: '当前在微信内，通常无法直接完成安装。请先在浏览器中打开当前页面，再继续下载烧不起。',
          steps: [
            '点击右上角菜单',
            '选择“在浏览器打开”',
            '推荐使用系统浏览器、Chrome、Edge 或 QQ 浏览器'
          ],
          tip: '在微信内通常无法直接安装，先切换到浏览器再继续。',
          actionText: '去浏览器打开',
          action: 'openBrowser'
        },
        iphone: {
          title: 'iPhone 使用指引',
          desc: '当前设备为 iPhone。请使用 Safari 打开当前页面，并将烧不起添加到主屏幕。',
          steps: isSafari
            ? [
                '点击底部或顶部分享按钮',
                '选择“添加到主屏幕”',
                '确认后即可从主屏幕打开烧不起'
              ]
            : [
                '先在当前浏览器菜单中选择“在 Safari 中打开”',
                '在 Safari 中点击分享按钮',
                '选择“添加到主屏幕”'
              ],
          tip: '请使用“添加到主屏幕”，不要下载安卓安装包。',
          actionText: '添加到主屏幕',
          action: 'iphoneGuide'
        },
        fallback: {
          title: '请在手机上继续',
          desc: '当前设备暂不支持直接下载分流，请使用手机打开本页面继续。',
          steps: [
            '在手机浏览器打开当前链接',
            'Android 点击“立即下载”',
            'iPhone 使用 Safari 选择“添加到主屏幕”'
          ],
          tip: '推荐在 Android 或 iPhone 设备中完成安装。',
          actionText: '复制链接',
          action: 'copyLink'
        }
      };

      var currentScene = scenes.fallback;
      if (isIPhone) {
        currentScene = scenes.iphone;
      } else if (isWeChat) {
        currentScene = scenes.wechat;
      } else if (isAndroid && isQQBrowser) {
        currentScene = scenes.androidQQ;
      } else if (isAndroid) {
        currentScene = scenes.android;
      }

      var titleEl = document.getElementById('scene-title');
      var descEl = document.getElementById('scene-desc');
      var stepsEl = document.getElementById('scene-steps');
      var tipEl = document.getElementById('scene-tip');
      var actionBtn = document.getElementById('action-btn');
      var closeBtn = document.getElementById('close-btn');

      titleEl.textContent = currentScene.title;
      descEl.textContent = currentScene.desc;
      tipEl.textContent = currentScene.tip;
      actionBtn.textContent = currentScene.actionText;

      stepsEl.innerHTML = '';
      currentScene.steps.forEach(function (step) {
        var item = document.createElement('li');
        item.textContent = step;
        stepsEl.appendChild(item);
      });

      function showToast(text) {
        var toastEl = document.getElementById('toast');
        toastEl.textContent = text;
        toastEl.classList.add('show');
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(function () {
          toastEl.classList.remove('show');
        }, 2600);
      }

      function copyCurrentLink() {
        var currentUrl = window.location.href;

        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(currentUrl).then(function () {
            return true;
          }).catch(function () {
            return false;
          });
        }

        try {
          var textarea = document.createElement('textarea');
          textarea.value = currentUrl;
          textarea.setAttribute('readonly', 'readonly');
          textarea.style.position = 'fixed';
          textarea.style.top = '-9999px';
          document.body.appendChild(textarea);
          textarea.select();
          var copied = document.execCommand('copy');
          document.body.removeChild(textarea);
          return Promise.resolve(copied);
        } catch (error) {
          return Promise.resolve(false);
        }
      }

      function resolveApkUrl(rawUrl) {
        try {
          return new URL(rawUrl, window.location.origin).toString();
        } catch (error) {
          return rawUrl;
        }
      }

      function buildApkDownloadUrl() {
        var baseUrl = resolveApkUrl(apkUrl);
        var joiner = baseUrl.indexOf('?') > -1 ? '&' : '?';
        return baseUrl + joiner + '_t=' + Date.now();
      }

      function triggerApkDownload() {
        var finalUrl = buildApkDownloadUrl();
        var anchor = document.createElement('a');
        anchor.href = finalUrl;
        anchor.setAttribute('download', 'shaobuqi.apk');
        anchor.setAttribute('rel', 'noopener');
        anchor.style.display = 'none';
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);
      }

      actionBtn.addEventListener('click', function () {
        if (currentScene.action === 'download') {
          triggerApkDownload();
          return;
        }

        if (currentScene.action === 'openBrowser') {
          copyCurrentLink().then(function (copied) {
            if (copied) {
              showToast('链接已复制，请在右上角菜单选择“在浏览器打开”');
            } else {
              showToast('请在右上角菜单选择“在浏览器打开”');
            }
          });
          return;
        }

        if (currentScene.action === 'iphoneGuide') {
          if (isSafari) {
            showToast('请点击分享按钮，选择“添加到主屏幕”');
          } else {
            showToast('请先在 Safari 打开本页，再选择“添加到主屏幕”');
          }
          return;
        }

        if (currentScene.action === 'copyLink') {
          copyCurrentLink().then(function (copied) {
            showToast(copied ? '链接已复制，请在手机浏览器打开' : '请在手机浏览器打开当前页面');
          });
        }
      });

      closeBtn.addEventListener('click', function () {
        window.history.back();
      });
    })();
  </script>
</body>
</html>
